<script>
function addNurse(){
  const ward=getCurrentWard();
  ensureWardDraftState();
  const rows=nurseDraftState[ward.id] || [];
  const id='n-'+Date.now();
  rows.push({
    id,
    name:'',
    team:'A',
    workTypeIds:[],
    placementRuleIds:[],
    maxNightPerMonth:data.commonScheduleSettings?.defaultMaxNightPerMonth||6,
    maxConsecutiveDays:data.commonScheduleSettings?.defaultMaxConsecutiveDays||5,
    notes:'',
    employmentStatus:'active'
  });
  nurseDraftState[ward.id]=rows;
  renderWardNurses();
}

const STORAGE_KEY='nurse-shift-scheduler-v4-html';
const legacyKeys=['nurse-shift-scheduler-v3-html','nurse-shift-scheduler-v2-html','nurse-shift-scheduler-v1-html'];
let currentUser=null, activeTab='', uiYear=new Date().getFullYear(), uiMonth=new Date().getMonth()+1, resultCache=null;
let nurseDraftState={};
let scheduleDraftState={};
let preselectNewWorkTypeShiftCodeId='';
let data=loadData();
ensureShiftCodeWorkTypeConsistency();
let lastSavedSnapshot = JSON.stringify(data);
ensureKoreanFixedHolidays(new Date().getFullYear());


function ensureShiftCodeWorkTypeConsistency(){
  if(!Array.isArray(data.shiftCodes)) data.shiftCodes=[];
  if(!Array.isArray(data.workTypes)) data.workTypes=[];

  const defaults = [
    {code:'D',name:'Day',startTime:'07:00',endTime:'15:00',desc:'주간근무'},
    {code:'E',name:'Evening',startTime:'15:00',endTime:'23:00',desc:'저녁근무'},
    {code:'N',name:'Night',startTime:'23:00',endTime:'07:00',desc:'야간근무'},
    {code:'O',name:'Off',startTime:'',endTime:'',desc:'휴무'},
    {code:'AL',name:'Annual Leave',startTime:'',endTime:'',desc:'연차'},
    {code:'SL',name:'Sick Leave',startTime:'',endTime:'',desc:'병가'},
    {code:'WO',name:'Wanted Off',startTime:'',endTime:'',desc:'희망휴무'}
  ];

  defaults.forEach(d=>{
    const existing = data.shiftCodes.find(s=>String(s.code||'').toUpperCase()===d.code);
    if(existing){
      existing.id = existing.id || ('sc-'+d.code.toLowerCase());
      existing.name = existing.name || d.name;
      existing.startTime = existing.startTime || d.startTime;
      existing.endTime = existing.endTime || d.endTime;
      existing.desc = existing.desc || d.desc;
    } else {
      data.shiftCodes.push({id:'sc-'+d.code.toLowerCase(), ...d});
    }
  });

  const codeToId = Object.fromEntries((data.shiftCodes||[]).filter(s=>s.code).map(s=>[String(s.code).toUpperCase(), s.id]));
  (data.workTypes||[]).forEach(w=>{
    if(!Array.isArray(w.allowedShiftCodeIds)){
      w.allowedShiftCodeIds = String(w.allowedCodes || '').split(',').map(c=>c.trim().toUpperCase()).filter(Boolean).map(c=>codeToId[c]).filter(Boolean);
    }
    // 휴무/휴가 코드는 모든 근무유형에서 근무표 입력에 필요하므로 누락되어 있으면 자동 포함
    ['O','AL','SL','WO'].forEach(code=>{
      const id=codeToId[code];
      if(id && !w.allowedShiftCodeIds.includes(id)) w.allowedShiftCodeIds.push(id);
    });
  });
}


function ensureDataDefaults(){
  const base = defaultData();
  if(!Array.isArray(data.users) || data.users.length===0) data.users = [...base.users];
  if(!data.users.find(u=>u.role==='admin')) data.users.unshift(base.users[0]);
  if(!data.users.find(u=>u.loginId==='ward51')) data.users.push(base.users[1]);
  if(!data.users.find(u=>u.loginId==='ward52')) data.users.push(base.users[2]);

  if(!Array.isArray(data.wards) || data.wards.length===0) data.wards = [...base.wards];
  if(!Array.isArray(data.shiftCodes) || data.shiftCodes.length===0) data.shiftCodes = [...base.shiftCodes];
  if(!Array.isArray(data.workTypes) || data.workTypes.length===0) data.workTypes = [...base.workTypes];
  if(!Array.isArray(data.placementRules) || data.placementRules.length===0) data.placementRules = [...base.placementRules];
  if(!Array.isArray(data.globalHolidays)) data.globalHolidays = [...base.globalHolidays];
  if(!data.commonScheduleSettings) data.commonScheduleSettings = {...base.commonScheduleSettings};
  if(!Array.isArray(data.generationRules)) data.generationRules = [...base.generationRules];
  if(!Array.isArray(data.systemEvents)) data.systemEvents = [...base.systemEvents];
  if(!Array.isArray(data.changeRequests)) data.changeRequests = [];

  data.shiftCodes = (data.shiftCodes||[]).map(s => ({
    id:s.id || ('sc-'+Math.random().toString(36).slice(2)),
    code:s.code || '',
    name:s.name || '',
    startTime:s.startTime || '',
    endTime:s.endTime || '',
    desc:s.desc || ''
  }));
  (data.workTypes||[]).forEach(w=>{
    if(!Array.isArray(w.allowedShiftCodeIds)){
      w.allowedShiftCodeIds = String(w.allowedCodes || '').split(',').map(c=>c.trim()).filter(Boolean)
        .map(code => (data.shiftCodes||[]).find(sc => sc.code===code)?.id).filter(Boolean);
    }
  });
  (data.wards||[]).forEach(w=>{
    if(!w.calendarEvents) w.calendarEvents=[];
    if(!w.additionalOffByMonth) w.additionalOffByMonth={};
    if(!w.requests) w.requests=[];
    if(!w.schedule) w.schedule={};
    if(!w.leaveRequests) w.leaveRequests = Array.isArray(w.requests) ? [...w.requests] : [];
    (w.nurses||[]).forEach(n=>{
      if(!Array.isArray(n.workTypeIds)) n.workTypeIds = Array.isArray(n.selectedWorkTypes) ? [...n.selectedWorkTypes] : [];
      if(!Array.isArray(n.placementRuleIds)) n.placementRuleIds = Array.isArray(n.selectedPlacementRules) ? [...n.selectedPlacementRules] : [];
    });
  });
}

async function loadFirebaseDataOnStart(){
  if(!window.nurseDb) return;
  try{
    const snap = await window.nurseDb.ref(window.NURSE_DB_PATH).get();
    if(snap.exists()){
      const remote = snap.val();
      if(remote && typeof remote === 'object'){
        data = remote;
        ensureShiftCodeWorkTypeConsistency();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        lastSavedSnapshot = JSON.stringify(data);
        ensureKoreanFixedHolidays(new Date().getFullYear());
      }
    } else {
      await window.nurseDb.ref(window.NURSE_DB_PATH).set(data);
    }
  }catch(e){
    console.warn('Firebase 데이터 불러오기 실패:', e);
  }
}

function watchFirebaseData(){
  if(!window.nurseDb) return;
  try{
    window.nurseDb.ref(window.NURSE_DB_PATH).on('value', function(snapshot){
      if(!snapshot.exists()) return;
      const incoming = snapshot.val();
      if(!incoming || typeof incoming !== 'object') return;
      const incomingText = JSON.stringify(incoming);
      if(incomingText === lastSavedSnapshot) return;
      data = incoming;
      ensureDataDefaults();
      const fixedText = JSON.stringify(data);
      localStorage.setItem(STORAGE_KEY, fixedText);
      lastSavedSnapshot = fixedText;
      if(currentUser){
        const refreshed = (data.users||[]).find(u => u.loginId === currentUser.loginId && u.role === currentUser.role);
        if(refreshed) currentUser = refreshed;
        renderApp();
        popup('Firebase 데이터가 반영되었습니다.');
      }
    });
  }catch(e){
    console.warn('Firebase 실시간 동기화 실패:', e);
  }
}




function getLunarMonthDay(dateObj){
  try{
    const fmt = new Intl.DateTimeFormat('en-u-ca-chinese', { month:'numeric', day:'numeric' });
    const parts = fmt.formatToParts(dateObj);
    const month = parts.find(p=>p.type==='month')?.value || '';
    const day = parts.find(p=>p.type==='day')?.value || '';
    const m = String(month).replace(/[^0-9]/g,'');
    const d = String(day).replace(/[^0-9]/g,'');
    if(!m || !d) return null;
    return { month:Number(m), day:Number(d) };
  }catch(e){
    return null;
  }
}
function ensureKoreanFixedHolidays(year){
  if(!Array.isArray(data.globalHolidays)) data.globalHolidays = [];

  // remove previously auto-seeded holidays for this year only, keep manual additions intact
  data.globalHolidays = data.globalHolidays.filter(h => !(h.auto && String(h.date||'').startsWith(`${year}-`)));

  const fixed = [
    {md:'01-01', type:'법정공휴일', note:'신정'},
    {md:'03-01', type:'법정공휴일', note:'삼일절'},
    {md:'05-05', type:'법정공휴일', note:'어린이날'},
    {md:'06-06', type:'법정공휴일', note:'현충일'},
    {md:'08-15', type:'법정공휴일', note:'광복절'},
    {md:'10-03', type:'법정공휴일', note:'개천절'},
    {md:'10-09', type:'법정공휴일', note:'한글날'},
    {md:'12-25', type:'법정공휴일', note:'기독탄신일'}
  ];

  fixed.forEach(h => {
    const date = `${year}-${h.md}`;
    const exists = data.globalHolidays.find(x => x.date === date);
    if(!exists){
      data.globalHolidays.push({date, type:h.type, note:h.note, auto:true});
    }
  });

  // Automatically seed lunar-based official holidays:
  // Seollal eve/day/day after, Buddha's Birthday, Chuseok eve/day/day after
  for(let month=1; month<=12; month++){
    const lastDay = new Date(year, month, 0).getDate();
    for(let day=1; day<=lastDay; day++){
      const dt = new Date(year, month-1, day);
      const next = new Date(year, month-1, day+1);
      const lunar = getLunarMonthDay(dt);
      const lunarNext = getLunarMonthDay(next);
      if(!lunar) continue;

      const date = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      let holidayMeta = null;

      // 설날 전날: 음력 12월 말일 -> 다음날이 음력 1월 1일
      if(lunar.month === 12 && lunarNext && lunarNext.month === 1 && lunarNext.day === 1){
        holidayMeta = { type:'법정공휴일', note:'설날 전날' };
      }
      // 설날 / 다음날
      else if(lunar.month === 1 && lunar.day === 1){
        holidayMeta = { type:'법정공휴일', note:'설날' };
      }
      else if(lunar.month === 1 && lunar.day === 2){
        holidayMeta = { type:'법정공휴일', note:'설날 다음날' };
      }
      // 부처님오신날
      else if(lunar.month === 4 && lunar.day === 8){
        holidayMeta = { type:'법정공휴일', note:'부처님오신날' };
      }
      // 추석 전날/당일/다음날
      else if(lunar.month === 8 && lunar.day === 14){
        holidayMeta = { type:'법정공휴일', note:'추석 전날' };
      }
      else if(lunar.month === 8 && lunar.day === 15){
        holidayMeta = { type:'법정공휴일', note:'추석' };
      }
      else if(lunar.month === 8 && lunar.day === 16){
        holidayMeta = { type:'법정공휴일', note:'추석 다음날' };
      }

      if(holidayMeta){
        const exists = data.globalHolidays.find(x => x.date === date);
        if(!exists){
          data.globalHolidays.push({ date, ...holidayMeta, auto:true });
        }
      }
    }
  }
}

    parsed.globalHolidays = Array.isArray(parsed.globalHolidays) ? parsed.globalHolidays : base.globalHolidays;
    parsed.globalHolidays = parsed.globalHolidays.map(h => typeof h === 'string' ? ({date:h,type:'공휴일',note:''}) : h);

      enabled:(typeof r.enabled==='boolean' ? r.enabled : true),
      priority:Number(r.priority || (idx+1))
    }));
    parsed.generationRules.sort((a,b)=>Number(a.priority||999)-Number(b.priority||999));
    (parsed.generationRules||[]).forEach((r,idx)=>{ r.priority=idx+1; });
    (parsed.generationRules||[]).forEach(r=>{ if(r.key) parsed.commonScheduleSettings[r.key]=!!r.enabled; });
    parsed.workTypes = Array.isArray(parsed.workTypes) ? parsed.workTypes : base.workTypes;
    parsed.placementRules = Array.isArray(parsed.placementRules) ? parsed.placementRules : base.placementRules;

    function normalizeWorkTypeList(list){
      return (Array.isArray(list) ? list : []).filter(w => w && w.name).map(w => {
        const allowedShiftCodeIds = Array.isArray(w.allowedShiftCodeIds) ? w.allowedShiftCodeIds :
          String(w.allowedCodes || '').split(',').map(c=>c.trim()).filter(Boolean)

        return {

          allowedShiftCodeIds,
          startTime:w.startTime || '',
          endTime:w.endTime || '',
          weekendRestricted:!!w.weekendRestricted,
          satRestricted:!!w.satRestricted,
          holidayRestricted:!!w.holidayRestricted
        };
      });
    }
    const savedWorkTypes = normalizeWorkTypeList(parsed.workTypes);
    const baseWorkTypes = normalizeWorkTypeList(base.workTypes);
    parsed.workTypes = [...baseWorkTypes];
    savedWorkTypes.forEach(w => {
      const same = parsed.workTypes.find(x => x.id===w.id || (x.name===w.name && x.code===w.code));
      if(same) Object.assign(same, w); else parsed.workTypes.push(w);

      }));
    }
    const savedPlacementRules = normalizePlacementList(parsed.placementRules);
    const basePlacementRules = normalizePlacementList(base.placementRules);
    parsed.placementRules = [...basePlacementRules];
    savedPlacementRules.forEach(w => {
      const same = parsed.placementRules.find(x => x.id===w.id || x.name===w.name);
      if(same) Object.assign(same, w); else parsed.placementRules.push(w);
    });
    parsed.commonScheduleSettings = Object.assign({}, base.commonScheduleSettings, parsed.commonScheduleSettings || {});
    parsed.generationRules = Array.isArray(parsed.generationRules) ? parsed.generationRules : (base.generationRules || []);
    parsed.generationRules = parsed.generationRules.map((r,idx)=>({

      key:r.key || '',
      enabled:(typeof r.enabled==='boolean' ? r.enabled : true),

    }));

    (parsed.generationRules||[]).forEach((r,idx)=>{ r.priority=idx+1; });
    (parsed.generationRules||[]).forEach(r=>{ if(r.key) parsed.commonScheduleSettings[r.key]=!!r.enabled; });
    parsed.changeRequests = Array.isArray(parsed.changeRequests) ? parsed.changeRequests : base.changeRequests;
    parsed.wards.forEach(w=>{
      if(!w.calendarEvents) w.calendarEvents=[];
      if(!w.additionalOffByMonth) w.additionalOffByMonth={};
      if(!w.requests) w.requests=[];
      if(!w.schedule) w.schedule={};

      if(!w.changeRequestsLocal) w.changeRequestsLocal = [];

        if(!Array.isArray(n.selectedWorkTypes)){
          const wt=[];
          if(n.isThreeShift) wt.push('wt-three');

          if(wt.length===0) wt.push('wt-daykeep');

        if(!Array.isArray(n.selectedPlacementRules)){

          if(n.isNewNurse) pr.push('pl-new');
          if(n.weekendRestricted) pr.push('pl-sat-restrict');

        if(!Array.isArray(n.placementRuleIds)) n.placementRuleIds = Array.isArray(n.selectedPlacementRules) ? [...n.selectedPlacementRules] : [];
        delete n.isThreeShift; delete n.isNightKeep; delete n.isPregnant; delete n.isShortDuty6; delete n.isNewNurse; delete n.weekendRestricted; delete n.holidayRestricted;

    if(!parsed.users.find(u=>u.loginId==='ward52')) parsed.users.push(base.users[2]);

  (n.placementRuleIds||[]).forEach(id=>{ const item=(data.placementRules||[]).find(w=>w.id===id); if(item) arr.push(item.name); });
  if(arr.length===0) arr.push('미지정');
  return arr.join(' / ');
}
function summarizeSchedule(schedule,nurses,y,m){
  const stats={}; 
  nurses.forEach(n=>stats[n.id]={totalOff:0,weekendHolidayOff:0,nights:0,days:0,evenings:0,midDays:0,workDays:0});
  for(let d=1;d<=daysInMonth(y,m);d++){
    const key=makeDateKey(y,m,d), dateType=getDateType(y,m,d);
    nurses.forEach(n=>{
      const code=schedule[key]?.[n.id]||'';
      if(['O','OF','AL','SL','WO'].includes(code)){ stats[n.id].totalOff++; if(dateType!=='weekday') stats[n.id].weekendHolidayOff++; }
      if(code==='D') stats[n.id].days++;
      if(code==='E') stats[n.id].evenings++;
      if(code==='N') stats[n.id].nights++;
      if(['MD','SD6'].includes(code)) stats[n.id].midDays++;
      if(['D','E','N','MD','SD6'].includes(code)) stats[n.id].workDays++;
    });
  }
  return stats;
}
function generateSchedule(ward,y,m){
  ensureKoreanFixedHolidays(y);
  const nurses=(ward.nurses||[]).filter(n=>n.employmentStatus==='active');
  const last=daysInMonth(y,m), schedule={}, warnings=[];
  const baseOff=holidayCountForMonth(y,m), addOff=getAdditionalOff(ward,y,m), targetOff=baseOff+addOff;
  const state={};
  nurses.forEach(n=>state[n.id]={assignedOff:0,assignedNights:0,assignedD:0,assignedE:0,consecutive:0,lastCode:'',weekendHolidayOff:0});

  const reqMap={}; (ward.requests||[]).forEach(r=>{ if(!reqMap[r.date]) reqMap[r.date]={}; reqMap[r.date][r.nurseId]=r; });

  function assign(date,nid,code,dtype){
    if(!schedule[date]) schedule[date]={};
    schedule[date][nid]=code;
    if(['O','OF','AL','SL','WO'].includes(code)){
      state[nid].assignedOff++;
      state[nid].consecutive=0;
      if(dtype!=='weekday') state[nid].weekendHolidayOff++;
    } else {
      state[nid].consecutive++;
    }
    if(code==='N') state[nid].assignedNights++;
    if(code==='D') state[nid].assignedD++;
    if(code==='E') state[nid].assignedE++;
    state[nid].lastCode=code;
  }

  function hasRule(n, name){
    return (n.placementRuleIds||[]).some(id => {
      const r=(data.placementRules||[]).find(x=>x.id===id);
      return r && String(r.name||'').trim()===name;
    });
  }
  function getRulePriority(name){
    const r=(data.placementRules||[]).find(x=>String(x.name||'').trim()===name);
    return Number(r?.priority || 999);
  }
  function priorityWeight(name, base){
    const p=getRulePriority(name);
    return p===999 ? base : Math.max(1, (100 - p*5)) * (base/20);
  }

  function teamCountOnDate(dateKey, team, shift){
    return nurses.filter(n=>n.team===team && schedule[dateKey]?.[n.id]===shift).length;
  }

  function scoreCandidate(n, shift, dateKey, dtype){
    let score = 0;
    const s=state[n.id];

    // Lower score is better
    if(shift==='N') score += s.assignedNights * 6;
    if(shift==='D') score += s.assignedD * 3;
    if(shift==='E') score += s.assignedE * 3;

    if((hasRule(n,'D/E/N 균등 분배') || data.commonScheduleSettings?.balanceDEN) && ['D','E','N'].includes(shift)){
      const vals=[s.assignedD, s.assignedE, s.assignedNights];
      const avg=(vals[0]+vals[1]+vals[2])/3;
      const next = shift==='D' ? s.assignedD+1 : shift==='E' ? s.assignedE+1 : s.assignedNights+1;
      score += Math.abs(next-avg) * priorityWeight('D/E/N 균등 분배', 20);
    }

    if((hasRule(n,'팀별 균형') || data.commonScheduleSettings?.balanceTeams) && ['D','E','N'].includes(shift)){
      score += teamCountOnDate(dateKey, n.team, shift) * priorityWeight('팀별 균형', 16);
    }

    if((hasRule(n,'나이트 순환') || data.commonScheduleSettings?.rotateNight) && shift==='N'){
      score += s.assignedNights * priorityWeight('나이트 순환', 12);
      if(s.lastCode==='N') score += priorityWeight('나이트 순환', 30);
    }

    if((hasRule(n,'나이트 적게') || data.commonScheduleSettings?.reduceNightForMarked) && shift==='N'){
      score += priorityWeight('나이트 적게', 40);
    }

    if(hasRule(n,'토요일 제한') && dtype==='sat') score += priorityWeight('토요일 제한', 1000);
    if(hasRule(n,'공휴일 제한') && dtype==='holiday') score += priorityWeight('공휴일 제한', 1000);
    if(hasRule(n,'주말 제한') && (dtype==='sat' || dtype==='sun')) score += priorityWeight('주말 제한', 1000);
    if(hasRule(n,'신규') && shift==='N') score += priorityWeight('신규', 20);

    score += s.consecutive * 4;
    if(shift==='D' && s.lastCode==='N') score += 1000;

    return score;
  }

  for(let d=1; d<=last; d++){
    const key=makeDateKey(y,m,d);
    const dtype=getDateType(y,m,d);
    const need={D:Number(ward.staffingRules?.D?.min||0), E:Number(ward.staffingRules?.E?.min||0), N:Number(ward.staffingRules?.N?.min||0)};
    schedule[key]={};

    // hard requests first
    nurses.forEach(n=>{
      const req=reqMap[key]?.[n.id];
      if(!req) return;
      if(req.type==='AL' || req.type==='SL'){
        assign(key,n.id,req.type,dtype);
      } else if(req.type==='WO'){
        assign(key,n.id,'WO',dtype);
      }
    });

    // restriction-driven SD6/off
    nurses.forEach(n=>{
      if(schedule[key][n.id]) return;
      const allowed=getAllowedCodes(n);
      const restricted=((hasRule(n,'토요일 제한') || hasRule(n,'주말 제한')) && dtype==='sat') || (hasRule(n,'공휴일 제한') && dtype==='holiday');
      if(restricted){
        assign(key,n.id,'OF',dtype);
        return;
      }
      if(allowed.includes('SD6')){
        assign(key,n.id,'SD6',dtype);
      }
    });

    // fill N, D, E
    ['N','D','E'].forEach(shift=>{
      while((need[shift]||0)>0){
        const candidates=nurses
          .filter(n=>!schedule[key][n.id])
          .filter(n=>getAllowedCodes(n).includes(shift))
          .filter(n=>{
            const maxN=Number(n.maxNightPerMonth || data.commonScheduleSettings?.defaultMaxNightPerMonth || 6);
            const maxC=Number(n.maxConsecutiveDays || data.commonScheduleSettings?.defaultMaxConsecutiveDays || 5);
            if(shift==='N' && state[n.id].assignedNights>=maxN) return false;
            if(state[n.id].consecutive>=maxC) return false;
            if(shift==='D' && state[n.id].lastCode==='N') return false;
            return true;
          })
          .sort((a,b)=>scoreCandidate(a,shift,key,dtype)-scoreCandidate(b,shift,key,dtype));

        const picked=candidates[0];
        if(!picked){
          warnings.push(`${key} ${shift} 인원 부족`);
          break;
        }
        assign(key,picked.id,shift,dtype);
        need[shift]--;
      }
    });

    // fill remaining with work first; off only when no valid work shift is available
    nurses.forEach(n=>{
      if(schedule[key][n.id]) return;
      const allowed=getAllowedCodes(n).filter(c=>!['O','OF','AL','SL','WO'].includes(c));
      let candidateShifts = allowed.filter(c=>{
        const maxN=Number(n.maxNightPerMonth || data.commonScheduleSettings?.defaultMaxNightPerMonth || 6);
        const maxC=Number(n.maxConsecutiveDays || data.commonScheduleSettings?.defaultMaxConsecutiveDays || 5);
        if(c==='N' && state[n.id].assignedNights>=maxN) return false;
        if(state[n.id].consecutive>=maxC) return false;
        if(c==='D' && state[n.id].lastCode==='N') return false;
        return true;
      });
      if(data.commonScheduleSettings?.fillRemainingWithWork!==false && candidateShifts.length){
        candidateShifts = candidateShifts.sort((a,b)=>scoreCandidate(n,a,key,dtype)-scoreCandidate(n,b,key,dtype));
        assign(key,n.id,candidateShifts[0],dtype);
      } else {
        assign(key,n.id,'OF',dtype);
      }
    });
  }

  const stats=summarizeSchedule(schedule,nurses,y,m);
  const offs=Object.values(stats).map(s=>s.totalOff);
  const nights=Object.values(stats).map(s=>s.nights);
  if(offs.length && Math.max(...offs)-Math.min(...offs)>2) warnings.push('간호사 간 총 OFF 편차가 큽니다.');
  if(nights.length && Math.max(...nights)-Math.min(...nights)>3) warnings.push('야간근무 편차가 큽니다.');
  return {schedule,warnings,stats,targetOff,baseOff,addOff};
}

function renderMonthCalendar(containerId, y, m, wardId=null, mode='view'){

  let cells=[];
  for(let i=0;i<firstDow;i++) cells.push('<div class="daycell"></div>');
  for(let d=1;d<=last;d++){
    const key=makeDateKey(y,m,d);
    const holidayMemo=getHolidayMemoByDate(key);
    let tags=`<div class="daymeta">${holidayMemo ? `<span class="holiday-note">${escapeHtml(holidayMemo)}</span>` : ''}</div>`;
    const systemEvents=(data.systemEvents||[]).filter(e=>e.date===key);
    const sharedWardEvents=getSharedWardEvents().filter(e=>e.date===key);
    const wardObj=wardId?getWardById(wardId):null;
    const ownWardPrivateEvents=wardObj ? (wardObj.calendarEvents||[]).filter(e=>e.date===key && !e.shareAll) : [];

      ...systemEvents.map(e=>`<div class="event hospital" onclick="manageEvent('system','${e.id}')" title="클릭하여 수정/삭제">${escapeHtml(formatEventLabel(e))}</div>`),

      </div>

    </div>`;
  attachTimeSelectBehavior();

  if(kind==='ward'){

  }

  if(!isReadonlyForWard){
    buttons.push({label:'삭제', action:function(){
      if(!confirm('이 일정을 삭제할까요?')) return;

      } else {

        if(!ward) return;

        saveData(true); renderApp(); closeModal(); popup('병동 일정이 삭제되었습니다.');
      }
    }});
    buttons.push({label:'수정', action:function(){
      const newTitle = document.getElementById('modalEditTitle')?.value.trim();
      const startRaw=(document.getElementById('modalEditStartTimeText')?.value || '').trim() || (document.getElementById('modalEditStartTime')?.value || '');
      const endRaw=(document.getElementById('modalEditEndTimeText')?.value || '').trim() || (document.getElementById('modalEditEndTime')?.value || '');
      const newStart = normalizeTimeInput(startRaw);
      const newEnd = normalizeTimeInput(endRaw);
      if(!newTitle){ alert('일정 제목을 입력하세요.'); return; }
      if(startRaw && newStart===null){ alert('시작 시간을 HH:MM 형식으로 입력하세요. 예: 09:00'); return; }
      if(endRaw && newEnd===null){ alert('종료 시간을 HH:MM 형식으로 입력하세요. 예: 10:30'); return; }
      if(newStart && newEnd && newStart > newEnd){ alert('종료 시간은 시작 시간보다 빠를 수 없습니다.'); return; }
      eventObj.title = newTitle;
      eventObj.startTime = newStart || '';
      eventObj.endTime = newEnd || '';
      delete eventObj.time;
      if(kind==='ward'){
        eventObj.shareAll = !!document.getElementById('modalEditShareAll')?.checked;
      }
      saveData(true); renderApp(); closeModal(); popup(kind==='system' ? '공유달력 일정이 수정되었습니다.' : '병동 일정이 수정되었습니다.');
    }, primary:true});
  }

  openModal('일정 관리', body, buttons);
}

function openModal(title, bodyHtml, buttons){
  const root=document.getElementById('modalRoot');
  root.className='';
  root.innerHTML = `<div class="modal-backdrop">
      <div class="modal-card">
        <div class="modal-title">${title}</div>
        <div style="height:12px"></div>
        <div>${bodyHtml}</div>
        <div class="modal-actions" id="modalActions"></div>
      </div>
    </div>`;
  const actions=root.querySelector('#modalActions');
  buttons.forEach((btn, idx)=>{
    const b=document.createElement('button');
    b.textContent=btn.label;
    if(btn.primary) b.className='primary';
    b.onclick=()=>{
      if(btn.action==='close') closeModal();
      else if(typeof btn.action==='function') btn.action();
    };
    actions.appendChild(b);
  });
}
function closeModal(){
  const root=document.getElementById('modalRoot');
  root.className='hidden';
  root.innerHTML='';
}



function normalizeTimeInput(v){
  const s = String(v||'').trim();
  if(!s) return '';
  const m = s.match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return null;
  let h = Number(m[1]), mm = Number(m[2]);
  if(h<0 || h>23 || mm<0 || mm>59) return null;
  return `${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}
function getSharedWardEvents(){
  return data.wards.flatMap(w => (w.calendarEvents||[])
    .filter(e => e.shareAll)
    .map(e => ({...e, wardName:w.name, sourceWardId:w.id, sourceType:'ward-shared'})));
}
function getAllSharedEventsForDate(date){
  const systemEvents = (data.systemEvents||[]).filter(e => e.date===date).map(e => ({...e, sourceType:'system'}));
  const wardShared = getSharedWardEvents().filter(e => e.date===date);
  return [...systemEvents, ...wardShared];
}





let draggedGenerationRuleId = null;
function persistGenerationRuleOrderFromList(ids){
  if(!Array.isArray(data.generationRules)) data.generationRules=[];
  const order = ids.filter(Boolean);
  data.generationRules.sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));
  data.generationRules.forEach((r,idx)=>{ r.priority = idx+1; });
  saveData(true);
}
function onGenerationRuleDragStart(id, ev){
  draggedGenerationRuleId = id;
  ev.dataTransfer.effectAllowed = 'move';
  try{ ev.dataTransfer.setData('text/plain', id); }catch(e){}
}
function onGenerationRuleDragOver(id, ev){
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'move';
  const target = ev.currentTarget;
  if(target) target.classList.add('drag-over');
}
function onGenerationRuleDragLeave(ev){
  const target = ev.currentTarget;
  if(target) target.classList.remove('drag-over');
}
function onGenerationRuleDrop(targetId, ev){
  ev.preventDefault();
  const dropEl = ev.currentTarget;
  if(dropEl) dropEl.classList.remove('drag-over');
  const sourceId = draggedGenerationRuleId || (function(){ try { return ev.dataTransfer.getData('text/plain'); } catch(e){ return ''; } })();
  if(!sourceId || sourceId===targetId) return;
  const list = getSortedGenerationRules().map(r=>r.id);
  const from = list.indexOf(sourceId);
  const to = list.indexOf(targetId);
  if(from===-1 || to===-1) return;
  const [moved] = list.splice(from,1);
  list.splice(to,0,moved);
  persistGenerationRuleOrderFromList(list);
  draggedGenerationRuleId = null;
  renderAdminGenerate();
  popup('공통 생성 원칙 순서가 변경되었습니다.');
}
function onGenerationRuleDragEnd(ev){
  draggedGenerationRuleId = null;
  document.querySelectorAll('.generation-rule-item.drag-over').forEach(el=>el.classList.remove('drag-over'));
}

function getSortedGenerationRules(){
  return [...(data.generationRules||[])].sort((a,b)=>Number(a.priority||999)-Number(b.priority||999));
}
function normalizeGenerationRulePriorities(){
  getSortedGenerationRules().forEach((r,idx)=>{ r.priority=idx+1; });
}
function moveGenerationRule(id, direction){
  const list=getSortedGenerationRules();
  const idx=list.findIndex(r=>r.id===id);
  if(idx===-1) return;
  const newIdx=idx+direction;
  if(newIdx<0 || newIdx>=list.length) return;
  const temp=list[idx].priority;
  list[idx].priority=list[newIdx].priority;
  list[newIdx].priority=temp;
  normalizeGenerationRulePriorities();
  saveData(true);
  renderAdminGenerate();
  popup('공통 생성 원칙 우선순위가 변경되었습니다.');
}

function changeAdminPassword(){
  const current = String(document.getElementById('adminCurrentPassword')?.value || '');
  const nextPw = String(document.getElementById('adminNewPassword')?.value || '');
  const confirmPw = String(document.getElementById('adminNewPasswordConfirm')?.value || '');
  const adminUser = (data.users||[]).find(u=>u.role==='admin');
  if(!adminUser) return alert('관리자 계정을 찾을 수 없습니다.');
  if(!current) return alert('현재 비밀번호를 입력하세요.');
  if(String(adminUser.password||'') !== current) return alert('현재 비밀번호가 올바르지 않습니다.');
  if(!nextPw) return alert('새 비밀번호를 입력하세요.');
  if(nextPw !== confirmPw) return alert('새 비밀번호 확인이 일치하지 않습니다.');
  adminUser.password = nextPw;

  if(currentUser && currentUser.role==='admin'){
    currentUser.password = nextPw;
  }

  saveData(true);
  ['adminCurrentPassword','adminNewPassword','adminNewPasswordConfirm'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.value='';
  });
  popup('관리자 비밀번호가 변경되었습니다.');
  renderAdminWards();
}


function saveAdminWardsTab(){
  if(document.activeElement && typeof document.activeElement.blur === 'function'){
    document.activeElement.blur();
  }

  const currentEl = document.getElementById('adminCurrentPassword');
  const newEl = document.getElementById('adminNewPassword');
  const confirmEl = document.getElementById('adminNewPasswordConfirm');

  const current = String(currentEl?.value || '').trim();
  const nextPw = String(newEl?.value || '').trim();
  const confirmPw = String(confirmEl?.value || '').trim();

  if(current || nextPw || confirmPw){
    const adminUser = (data.users||[]).find(u=>u.role==='admin');
    if(!adminUser) return alert('관리자 계정을 찾을 수 없습니다.');
    if(String(adminUser.password||'') !== current) return alert('현재 비밀번호가 올바르지 않습니다.');
    if(!nextPw) return alert('새 비밀번호를 입력하세요.');
    if(nextPw !== confirmPw) return alert('새 비밀번호 확인이 일치하지 않습니다.');
    adminUser.password = nextPw;
    if(currentUser && currentUser.role==='admin'){
      currentUser.password = nextPw;
    }
    if(currentEl) currentEl.value='';
    if(newEl) newEl.value='';
    if(confirmEl) confirmEl.value='';

  saveData(true);
  renderAdminWards();
  renderTopStats();
  popup('병동/계정 변경사항이 저장되었습니다.');
}

function addShiftCode(){
  var codeEl=document.getElementById('newShiftCodeCode');
  var nameEl=document.getElementById('newShiftCodeName');
  var startEl=document.getElementById('newShiftCodeStart');
  var endEl=document.getElementById('newShiftCodeEnd');
  var descEl=document.getElementById('newShiftCodeDesc');
  var code=codeEl ? String(codeEl.value||'').trim() : '';
  var name=nameEl ? String(nameEl.value||'').trim() : '';
  var startTime=startEl ? String(startEl.value||'').trim() : '';
  var endTime=endEl ? String(endEl.value||'').trim() : '';
  var desc=descEl ? String(descEl.value||'').trim() : '';
  if(!code){ alert('근무코드를 입력하세요.'); return; }
  if(!name){ alert('근무코드 이름을 입력하세요.'); return; }
  if((data.shiftCodes||[]).find(s=>String(s.code||'').toLowerCase()===code.toLowerCase())){
    alert('이미 존재하는 근무코드입니다.');
    return;
  }
  if(!Array.isArray(data.shiftCodes)) data.shiftCodes=[];
  const newId='sc-'+Date.now();
  data.shiftCodes.push({id:newId, code, name, startTime, endTime, desc});
  preselectNewWorkTypeShiftCodeId=newId;
  if(codeEl) codeEl.value='';
  if(nameEl) nameEl.value='';
  if(startEl) startEl.value='';
  if(endEl) endEl.value='';
  if(descEl) descEl.value='';
  saveData(true);
  renderAdminCodes();
  popup('근무코드가 추가되었습니다.');
}
function updateShiftCodeField(id,key,value){

function deleteShiftCode(id){

function addWorkType(){

  var name=nameEl ? String(nameEl.value||'').trim() : '';
  var code=codeEl ? String(codeEl.value||'').trim() : '';

  if(nameEl) nameEl.value='';
  if(codeEl) codeEl.value='';

      if(!code){ alert('근무유형 코드를 입력하세요.'); return; }

function updateWardStaffingRule(shift,key,val){
  const ward=getCurrentWard();
  if(!ward.staffingRules) ward.staffingRules={D:{min:0,max:0},E:{min:0,max:0},N:{min:0,max:0}};
  if(!ward.staffingRules[shift]) ward.staffingRules[shift]={min:0,max:0};
  ward.staffingRules[shift][key]=Number(val||0);
  saveData(true);
}

function ensureWardDraftState(){
  const ward=getCurrentWard();
  if(!ward) return;
  if(!nurseDraftState[ward.id]){
    nurseDraftState[ward.id]=(ward.nurses||[]).map(n=>JSON.parse(JSON.stringify(n)));
  }
}
function getWardDraftRows(){
  ensureWardDraftState();
  const ward=getCurrentWard();
  return nurseDraftState[ward.id] || [];
}
function updateNurseDraft(id,key,val){
  const ward=getCurrentWard();
  ensureWardDraftState();
  const rows=nurseDraftState[ward.id]||[];
  const n=rows.find(x=>x.id===id);
  if(!n) return;
  n[key]=val;
}
function toggleNurseDraftSelection(id,bucket,itemId,checked){
  const ward=getCurrentWard();
  ensureWardDraftState();
  const rows=nurseDraftState[ward.id]||[];
  const n=rows.find(x=>x.id===id);
  if(!n) return;
  if(!Array.isArray(n[bucket])) n[bucket]=[];
  if(checked){
    if(!n[bucket].includes(itemId)) n[bucket].push(itemId);
  } else {
    n[bucket]=n[bucket].filter(v=>v!==itemId);
  }
}
function saveWardNurseTable(){
  const ward=getCurrentWard();
  ensureWardDraftState();
  ward.nurses = JSON.parse(JSON.stringify(nurseDraftState[ward.id]||[]));

  popup('근무자 명단 및 근무 형태가 저장되었습니다.');

function getScheduleDraftKey(wardId,y,m){ return `${wardId}-${y}-${m}`; }
function cloneJson(v){ return JSON.parse(JSON.stringify(v||{})); }
function ensureScheduleDraft(ward,y,m){
  const key=getScheduleDraftKey(ward.id,y,m);
  if(!scheduleDraftState[key]){
    scheduleDraftState[key]={ schedule: cloneJson(ward.schedule||{}), edit:false };
  }
  return scheduleDraftState[key];
}
function getAvailableScheduleCodes(){
  return (data.shiftCodes||[]).map(s=>s.code).filter(Boolean);
}
function updateScheduleCellDraft(wardId,y,m,dateKey,nurseId,val){
  const key=getScheduleDraftKey(wardId,y,m);
  if(!scheduleDraftState[key]) return;
  if(!scheduleDraftState[key].schedule[dateKey]) scheduleDraftState[key].schedule[dateKey]={};
  scheduleDraftState[key].schedule[dateKey][nurseId]=val;
}

function exportWardScheduleExcel(){
  const ward=getCurrentWard();
  const draft=ensureScheduleDraft(ward,uiYear,uiMonth);
  const schedule=draft.schedule||{};
  const stats=summarizeSchedule(schedule,ward.nurses,uiYear,uiMonth);
  const dayCount=daysInMonth(uiYear,uiMonth);
  let rows=[];
  let header=['간호사'];
  for(let d=1; d<=dayCount; d++){
    header.push(String(d));
  }
  header.push('D 횟수','E 횟수','N 횟수','MD 횟수','OFF 개수','주말/휴일 OFF');
  rows.push(header);
  (ward.nurses||[]).forEach(n=>{
    let row=[n.name||''];
    for(let d=1; d<=dayCount; d++){
      const key=makeDateKey(uiYear,uiMonth,d);
      row.push(schedule[key]?.[n.id]||'');
    }
    row.push(String(stats[n.id]?.days||0), String(stats[n.id]?.evenings||0), String(stats[n.id]?.nights||0), String(stats[n.id]?.midDays||0), String(stats[n.id]?.totalOff||0), String(stats[n.id]?.weekendHolidayOff||0));
    rows.push(row);
  });
  const csv = rows.map(r=>r.map(v=>{
    const s=String(v??'');
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
  }).join(',')).join('\r\n');
  const bom = '\ufeff';
  const blob = new Blob([bom + csv], {type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${ward.name}_${uiYear}_${String(uiMonth).padStart(2,'0')}_근무표.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function renderGenerateSummary(){
  const ward=getCurrentWard();
  if(!ward) return '';
  const draft=ensureScheduleDraft(ward,uiYear,uiMonth);
  const schedule=draft.schedule||{};
  const stats=summarizeSchedule(schedule,ward.nurses,uiYear,uiMonth);
  const targetOff=(holidayCountForMonth(uiYear,uiMonth) + Number((ward.additionalOffByMonth||{})[monthKey(uiYear,uiMonth)]||0));
  let issues=[];
  if(resultCache && Array.isArray(resultCache.warnings) && resultCache.warnings.length){
    const monthPrefix = `${uiYear}-${String(uiMonth).padStart(2,'0')}`;
    issues = issues.concat(resultCache.warnings.filter(w => {
      const s=String(w);
      return s.includes(monthPrefix) || !/^\d{4}-\d{2}-\d{2}/.test(s)
    }));
  }
  (ward.nurses||[]).forEach(n=>{
    const totalOff=Number(stats[n.id]?.totalOff||0);
    if(totalOff < targetOff){
      issues.push(`${n.name} OFF 부족 (${totalOff}/${targetOff})`);
    }
  });

  if(issues.length===0){
    return `<div class="ok" style="margin-top:8px">근무인원 부족, OFF 부족 등의 문제 없음 · 근무형태 및 배치기준 충족</div>`;
  }
  return `<div>
    <div class="alert" style="margin-top:8px"><strong>근무표 확인 필요</strong></div>
    ${issues.map(w=>`<div class="alert" style="margin-top:8px">${w}</div>`).join('')}
  </div>`;
}

function renderScheduleTable(ward,schedule,stats,editable=false){
  const dayCount=daysInMonth(uiYear,uiMonth);
  const codeOptions=getAvailableScheduleCodes();
  let html='<div class="schedule-wrap"><table><thead><tr><th class="sticky">간호사</th>';
  for(let d=1;d<=dayCount;d++){
    const dayClass=getDayNumberClass(uiYear,uiMonth,d);
    const dowClass=getDowClass(uiYear,uiMonth,d);
    const key=makeDateKey(uiYear,uiMonth,d);
    const memo=getHolidayMemoByDate(key);
    html+=`<th><div class="${dayClass}">${d}</div><div class="small ${dowClass}">${getDowLabel(uiYear,uiMonth,d)}</div>${memo?`<div class="holiday-note" style="margin-top:4px">${escapeHtml(memo)}</div>`:''}</th>`;
  }
  html+='<th>D 횟수</th><th>E 횟수</th><th>N 횟수</th><th>MD 횟수</th><th>OFF 개수</th><th>주말/휴일 OFF</th></tr></thead><tbody>';
  (ward.nurses||[]).forEach(n=>{
    html+=`<tr><td class="sticky"><div><strong>${escapeHtml(n.name)}</strong></div></td>`;
    for(let d=1;d<=dayCount;d++){
      const key=makeDateKey(uiYear,uiMonth,d), code=schedule[key]?.[n.id]||'';
      if(editable){
        html+=`<td class="schedule-code-cell"><select class="schedule-cell-select" onchange="updateScheduleCellDraft('${ward.id}',${uiYear},${uiMonth},'${key}','${n.id}',this.value)"><option value=""></option>${codeOptions.map(c=>`<option value="${c}" ${c===code?'selected':''}>${c}</option>`).join('')}</select></td>`;
      } else {
        html+=`<td class="schedule-code-cell">${escapeHtml(code)}</td>`;
      }
    }
    html+=`<td>${stats[n.id]?.days||0}</td><td>${stats[n.id]?.evenings||0}</td><td>${stats[n.id]?.nights||0}</td><td>${stats[n.id]?.midDays||0}</td><td>${stats[n.id]?.totalOff||0}</td><td>${stats[n.id]?.weekendHolidayOff||0}</td></tr>`;
  });
  html+='</tbody></table></div>'; return html;
}

function syncFromStorageSilently(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw || raw===lastSavedSnapshot) return;
    const incoming = JSON.parse(raw);
    if(!incoming) return;
    data = incoming;
    lastSavedSnapshot = raw;
    if(currentUser){
      if(currentUser.role==='ward'){
        const refreshedUser = (data.users||[]).find(u=>u.loginId===currentUser.loginId && u.password===currentUser.password);
        if(refreshedUser) currentUser = refreshedUser;
      } else {
        const refreshedAdmin = (data.users||[]).find(u=>u.loginId===currentUser.loginId && u.role==='admin');
        if(refreshedAdmin) currentUser = refreshedAdmin;
      }
      renderApp();
      popup('다른 화면의 변경사항이 자동 반영되었습니다.');
    }
  }catch(e){}
}

window.addEventListener('storage', function(e){
  if(e.key===STORAGE_KEY){ syncFromStorageSilently(); }
});

setInterval(function(){
  syncFromStorageSilently();
}, 1500);


function toggleTimeSelectMode(sel, forceOpen){
  if(!sel) return;
  if(forceOpen){
    sel.classList.remove('time-select-collapsed');
    sel.classList.add('time-select-open');
    sel.setAttribute('size','4');
  } else {
    sel.classList.remove('time-select-open');
    sel.classList.add('time-select-collapsed');
    sel.removeAttribute('size');
  }
}
function attachTimeSelectBehavior(){
  document.querySelectorAll('select[data-time-select="1"]').forEach(function(sel){
    if(sel.dataset.bound === '1') return;
    sel.dataset.bound = '1';
    toggleTimeSelectMode(sel, false);

    sel.addEventListener('focus', function(){
      toggleTimeSelectMode(sel, true);
    });
    sel.addEventListener('mousedown', function(){
      toggleTimeSelectMode(sel, true);
    });
    sel.addEventListener('change', function(){
      toggleTimeSelectMode(sel, false);
    });
    sel.addEventListener('blur', function(){
      setTimeout(function(){ toggleTimeSelectMode(sel, false); }, 100);
    });
  });
}
